<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Generator สำหรับครูไทย</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2980b9; --secondary: #2c3e50; --bg: #f0f4f8; --text: #333; --accent: #e67e22; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); padding: 20px; max-width: 850px; margin: auto; line-height: 1.6; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 5px solid var(--primary); }
        
        header { text-align: center; margin-bottom: 25px; }
        h1 { color: var(--primary); margin: 0 0 5px 0; font-size: 1.8rem; }
        p.subtitle { color: #666; margin: 0; }

        .section-title { font-weight: 600; color: var(--secondary); border-bottom: 2px solid #eee; padding-bottom: 5px; margin-top: 20px; margin-bottom: 15px; font-size: 1.1rem; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: 600; display: block; margin-bottom: 5px; font-size: 0.95rem; color: #444; }
        .hint { font-weight: 300; font-size: 0.85rem; color: #888; }
        
        input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid #ccd1d9; border-radius: 6px; font-family: inherit; font-size: 1rem; box-sizing: border-box; background-color: #fafbfc; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); outline: none; background-color: #fff; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        
        .generate-btn { background: var(--primary); color: white; border: none; padding: 15px; font-size: 1.2rem; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; transition: 0.3s; }
        .generate-btn:hover { background: #1f6391; }

        #output-section { display: none; margin-top: 20px; }
        .prompt-box { background: #f8f9fa; border: 2px dashed #bdc3c7; padding: 20px; border-radius: 8px; white-space: pre-wrap; font-family: monospace; font-size: 1rem; color: #2c3e50; line-height: 1.6; }
        
        .action-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-copy, .btn-download { color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .btn-copy { background: #27ae60; }
        .btn-download { background: var(--accent); }

        @media (max-width: 768px) { .grid-2, .grid-3, .action-buttons { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="card">
        <header>
            <h1>✨ Pro Teacher Prompt Generator</h1>
            <p class="subtitle">เครื่องมือสร้างคำสั่ง AI สำหรับครูไทย (รองรับหลักสูตรแกนกลาง)</p>
        </header>
        
        <div class="section-title">1. บทบาทและงาน (Role & Task)</div>
        <div class="grid-2">
            <div class="form-group">
                <label>🎭 AI สวมบทบาทเป็น</label>
                <select id="role">
                    <option value="ครูผู้เชี่ยวชาญด้านการออกแบบการจัดการเรียนรู้เชิงรุก (Active Learning)">ผู้เชี่ยวชาญ Active Learning</option>
                    <option value="ครูวิชาวิทยาศาสตร์และเทคโนโลยี">ครูสายวิทย์-เทคโนโลยี</option>
                    <option value="ครูวิชาภาษาไทยและสังคมศึกษา">ครูสายภาษา-สังคม</option>
                </select>
            </div>
            <div class="form-group">
                <label>🎯 งานที่ต้องการให้ทำ</label>
                <select id="task">
                    <option value="เขียนแผนการจัดการเรียนรู้ (Lesson Plan)">📝 เขียนแผนการจัดการเรียนรู้</option>
                    <option value="ออกข้อสอบปรนัย 4 ตัวเลือก จำนวน 10 ข้อ">📝 ออกข้อสอบปรนัย</option>
                    <option value="ออกแบบกิจกรรมกลุ่มในห้องเรียน">🎲 ออกแบบกิจกรรม</option>
                    <option value="สร้างตารางเกณฑ์การประเมินผล (Rubric Score)">📊 สร้าง Rubric</option>
                </select>
            </div>
        </div>

        <div class="section-title">2. บริบทและเป้าหมาย (Context)</div>
        <div class="grid-3">
            <div class="form-group">
                <label>📚 วิชา</label>
                <input type="text" id="subject" placeholder="เช่น วิทยาศาสตร์">
            </div>
            <div class="form-group">
                <label>🎓 ระดับชั้น</label>
                <input type="text" id="grade" placeholder="เช่น ป.5">
            </div>
            <div class="form-group">
                <label>⏱️ เวลาที่ใช้</label>
                <input type="text" id="duration" placeholder="เช่น 50 นาที" value="50 นาที">
            </div>
        </div>

        <div class="grid-3">
            <div class="form-group">
                <label>📌 มาตรฐาน <span class="hint">(ไม่บังคับ)</span></label>
                <input type="text" id="standard" placeholder="เช่น ว 1.2">
            </div>
            <div class="form-group">
                <label>🎯 ตัวชี้วัด <span class="hint">(ไม่บังคับ)</span></label>
                <input type="text" id="indicator" placeholder="เช่น ป.5/1">
            </div>
            <div class="form-group">
                <label>📖 สาระแกนกลาง <span class="hint">(ไม่บังคับ)</span></label>
                <input type="text" id="coreContent" placeholder="เนื้อหาย่อ...">
            </div>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>🔎 หัวข้อเนื้อหา (Topic)</label>
                <input type="text" id="topic" placeholder="เช่น ระบบหายใจ">
            </div>
            <div class="form-group">
                <label>🛠️ ทักษะที่เน้น <span class="hint">(ไม่บังคับ)</span></label>
                <input type="text" id="skills" placeholder="เช่น การคิดวิเคราะห์">
            </div>
        </div>

        <div class="form-group">
            <label>🏅 สมรรถนะ/เป้าหมาย (Learning Objective)</label>
            <textarea id="objective" rows="2" placeholder="เด็กสามารถทำอะไรได้..."></textarea>
        </div>

        <div class="section-title">3. รูปแบบ (Format)</div>
        <div class="form-group">
            <select id="format">
                <option value="ใช้ภาษาที่เป็นทางการเชิงวิชาการ จัดเรียงเนื้อหาเป็นหัวข้อ (Bullet points) ให้อ่านง่าย">ทางการ (วิชาการ + อ่านง่าย)</option>
                <option value="ใช้ภาษาสนุกสนาน เป็นกันเอง กระตุ้นความสนใจ">สนุกสนาน (น่าสนใจ)</option>
                <option value="นำเสนอข้อมูลในรูปแบบตาราง (Table) ที่เป็นระเบียบ">รูปแบบตาราง (Table)</option>
            </select>
        </div>

        <button class="generate-btn" onclick="generatePrompt()">🚀 สร้าง Prompt ทันที</button>
    </div>

    <div id="output-section" class="card">
        <h2 style="color: var(--primary); margin-top: 0;">✅ Prompt พร้อมใช้งาน!</h2>
        <div id="generated-prompt" class="prompt-box"></div>
        <div class="action-buttons">
            <button class="btn-copy" onclick="copyToClipboard()">📋 คัดลอกข้อความ</button>
            <button class="btn-download" onclick="downloadTxt()">💾 โหลดเป็นไฟล์ .txt</button>
        </div>
    </div>

<script>
    let currentPromptText = "";

    function generatePrompt() {
        try {
            // ดึงข้อมูล
            const role = document.getElementById('role').value;
            const taskRaw = document.getElementById('task').value;
            const subject = document.getElementById('subject').value || "[ระบุวิชา]";
            const grade = document.getElementById('grade').value || "[ระบุระดับชั้น]";
            const duration = document.getElementById('duration').value || "50 นาที";
            
            const standard = document.getElementById('standard').value.trim();
            const indicator = document.getElementById('indicator').value.trim();
            const coreContent = document.getElementById('coreContent').value.trim();
            const topic = document.getElementById('topic').value || "[ระบุหัวข้อ]";
            const skills = document.getElementById('skills').value.trim();
            const objective = document.getElementById('objective').value || "สามารถนำไปประยุกต์ใช้ได้จริงตามสมรรถนะ";
            const format = document.getElementById('format').value;

            // ตรวจสอบหลักสูตร
            let curriculumText = "";
            if (standard) curriculumText += `\n- มาตรฐานการเรียนรู้: ${standard}`;
            if (indicator) curriculumText += `\n- ตัวชี้วัด: ${indicator}`;
            if (coreContent) curriculumText += `\n- สาระการเรียนรู้แกนกลาง: ${coreContent}`;

            let skillsText = "";
            if (skills) skillsText = `\n- ทักษะ/สมรรถนะย่อยที่ต้องการเน้น: ${skills}`;

            // โครงสร้าง AI
            let specificStructure = "";
            if (taskRaw.includes("แผนการจัดการเรียนรู้")) {
                specificStructure = `[Structure / องค์ประกอบที่ต้องมี]\n1. จุดประสงค์การเรียนรู้ (แยก K-S-A)\n2. สื่อและแหล่งการเรียนรู้\n3. กิจกรรมการจัดการเรียนรู้ (จัดสรรเวลา ${duration} แบ่งเป็น ขั้นนำ ขั้นสอน ขั้นสรุป)\n4. การวัดและประเมินผล (สอดคล้อง K-S-A)`;
            } else if (taskRaw.includes("ข้อสอบ")) {
                specificStructure = `[Structure / องค์ประกอบที่ต้องมี]\n1. คำถามที่ชัดเจน\n2. ตัวเลือก 4 ข้อ (พร้อมตัวลวงที่สมเหตุสมผล)\n3. เฉลยข้อที่ถูกต้อง\n4. คำอธิบายเฉลยอย่างละเอียด`;
            } else if (taskRaw.includes("กิจกรรม")) {
                specificStructure = `[Structure / องค์ประกอบที่ต้องมี]\n1. ชื่อกิจกรรม\n2. กติกาและวิธีการ (Step-by-step)\n3. การบริหารเวลา (${duration})\n4. คำถามสะท้อนคิด (Reflection)`;
            } else if (taskRaw.includes("Rubric")) {
                specificStructure = `[Structure / องค์ประกอบที่ต้องมี]\n1. เกณฑ์ประเมิน 4 ระดับ\n2. คำอธิบายพฤติกรรมที่ชัดเจน วัดผลได้จริง\n3. น้ำหนักคะแนน`;
            }

            // ประกอบข้อความ
            currentPromptText = `[Role]\nคุณคือ ${role}\n\n[Task]\nหน้าที่ของคุณคือ ${taskRaw} (เวลา: ${duration})\n\n[Context]\n- วิชา: ${subject}\n- ระดับชั้น: ${grade}${curriculumText}\n- หัวข้อเนื้อหา: ${topic}${skillsText}\n- เป้าหมายการเรียนรู้: ${objective}\n\n${specificStructure}\n\n[Format & Tone]\nข้อกำหนด: ${format}\n\n(เริ่มสร้างเนื้อหาตามโครงสร้างด้านบนได้ทันที ไม่ต้องเกริ่นนำ)`;

            // แสดงผล
            document.getElementById('generated-prompt').innerText = currentPromptText;
            document.getElementById('output-section').style.display = 'block';
            document.getElementById('output-section').scrollIntoView({ behavior: 'smooth' });

        } catch (error) {
            alert("เกิดข้อผิดพลาดในระบบ: " + error.message);
        }
    }

    function copyToClipboard() {
        try {
            navigator.clipboard.writeText(currentPromptText).then(() => {
                alert("✅ คัดลอกสำเร็จ! นำไปวางใน AI ได้เลยครับ");
            });
        } catch (error) {
            alert("ไม่สามารถคัดลอกอัตโนมัติได้ กรุณาคลุมดำข้อความแล้วกด Ctrl+C ครับ");
        }
    }

    function downloadTxt() {
        try {
            const blob = new Blob([currentPromptText], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Prompt_${new Date().getTime()}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        } catch (error) {
            alert("ไม่สามารถดาวน์โหลดได้: " + error.message);
        }
    }
</script>

</body>
</html>
